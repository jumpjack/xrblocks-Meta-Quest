<!DOCTYPE html>
<html lang="en">
  <head>
    <title>3DGS Walkthrough with Custom Model</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link
      type="text/css"
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/google/xrblocks@main/samples/main.css"
    />
    <!-- Importmap per mappare i moduli bare alle CDN -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "xrblocks": "https://cdn.jsdelivr.net/gh/google/xrblocks@build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/gh/google/xrblocks@build/addons/",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.9/spark.module.js"
        }
      }
    </script>
  </head>
  <body>
    <!-- Il tuo codice JavaScript (ex main.js) va qui -->
    <script type="module">
      // Le importazioni ora verranno risolte dall'importmap
      import {LongSelectHandler} from 'xrblocks/addons/ui/LongSelectHandler.js';
      import {SplatMesh, SparkRenderer} from '@sparkjsdev/spark';
      import * as THREE from 'three';
      import * as xb from 'xrblocks'; // Questo è per la libreria principale di xrblocks

      // Base URL per asset proprietari (usato nell'originale, mantenuto qui)
      const PROPRIETARY_ASSETS_BASE_URL =
        'https://cdn.jsdelivr.net/gh/xrblocks/proprietary-assets@main/';

      // Il tuo asset Splat personalizzato
const SPLAT_ASSETS = [
  {
    url: PROPRIETARY_ASSETS_BASE_URL + '3dgs_scenes/nyc.spz',
    scale: new THREE.Vector3(1.3, 1.3, 1.3),
    position: new THREE.Vector3(0, -0.15, 0),
    quaternion: new THREE.Quaternion(1, 0, 0, 0),
  },
  {
    url: PROPRIETARY_ASSETS_BASE_URL + '3dgs_scenes/alameda.spz',
    scale: new THREE.Vector3(1.3, 1.3, 1.3),
    position: new THREE.Vector3(0, 0, 0),
    quaternion: new THREE.Quaternion(1, 0, 0, 0),
  },
  {
    url: 'https://raw.githubusercontent.com/jumpjack/gaussian-quest-experiments/main/vrGaussians-albero-libro4.spz',
    scale: new THREE.Vector3(1.3, 1.3, 1.3),
    position: new THREE.Vector3(0, 0, 0),
    quaternion: new THREE.Quaternion(1, 0, 0, 0),
  } ,
  {
    url: 'giardino.spz', // Assicurati che questo asset sia disponibile e nel percorso corretto!
    scale: new THREE.Vector3(1.3, 1.3, 1.3),
    position: new THREE.Vector3(0, 0, 0),
    quaternion: new THREE.Quaternion(1, 0, 0, 0),
  }  
];


      const FADE_DURATION_S = 1.0; // seconds
      const MOVE_SPEED = 0.05;

      function easeInOutSine(x) {
        return -(Math.cos(Math.PI * x) - 1) / 2;
      }

      const forward = new THREE.Vector3();
      const right = new THREE.Vector3();
      const moveDirection = new THREE.Vector3();

      /**
       * An XR-Blocks demo that displays room-scale 3DGS models, allowing smooth
       * transitions via number keys (1, 2) or a 1.5 s long-pinch.
       */
      class WalkthroughManager extends xb.Script {
        async init() {
          console.log('WalkthroughManager: Inizializzazione avviata.');
          this.add(new THREE.HemisphereLight(0xffffff, 0x666666, 3));

          // Load all splat meshes in parallel.
          console.log('WalkthroughManager: Caricamento splat meshes...');
          this.splatMeshes = await Promise.all(
            SPLAT_ASSETS.map(async (asset, index) => {
              console.log(`WalkthroughManager: Caricamento asset ${index}: ${asset.url}`);
              const mesh = new SplatMesh({url: asset.url});
              await mesh.initialized; // Attendi che il mesh sia inizializzato
              console.log(`WalkthroughManager: Asset ${index} (${asset.url}) caricato.`);
              mesh.position.copy(asset.position);
              mesh.quaternion.copy(asset.quaternion);
              mesh.scale.copy(asset.scale);
              return mesh;
            })
          );
          console.log(`WalkthroughManager: Tutti gli ${this.splatMeshes.length} asset splat caricati.`);


          // Create a SparkRenderer for gaussian splat rendering and register it so
          // the simulator can toggle encodeLinear for correct color space.
          const sparkRenderer = new SparkRenderer({
            renderer: xb.core.renderer,
            maxStdDev: Math.sqrt(5),
          });
          xb.core.registry.register(new xb.SparkRendererHolder(sparkRenderer));
          xb.add(sparkRenderer);
          console.log('WalkthroughManager: SparkRenderer aggiunto.');

          // Show the first splat.
          this.currentIndex = 0;
          xb.add(this.splatMeshes[this.currentIndex]);
          console.log(`WalkthroughManager: Mostrato splat iniziale (indice ${this.currentIndex}).`);

          // fadeProgress tracks animation time: null = idle, 0‥FADE_DURATION_S =
          // fading out, FADE_DURATION_S‥2×FADE_DURATION_S = fading in.
          this.fadeProgress = null;
          this.nextIndex = null;

          // Locomotion state.
          this.locomotionOffset = new THREE.Vector3();
          this.baseReferenceSpace = null;
          this.keys = {w: false, a: false, s: false, d: false};

          document.addEventListener('keydown', this.onKeyDown.bind(this));
          document.addEventListener('keyup', this.onKeyUp.bind(this));
          console.log('WalkthroughManager: Listener tastiera aggiunti.');

          // LongSelectHandler già presente
          xb.add(
            new LongSelectHandler(this.cycleSplat.bind(this), {
              triggerDelay: 1500,
              triggerCooldownDuration: 1500,
            })
          );
          console.log('WalkthroughManager: LongSelectHandler aggiunto per cambio splat dopo 1.5s.');


          // **** AGGIUNTO PER IL CAMBIO VIA CONTROLLER ****
          this.inputHandler = new xb.InputHandler();
          xb.add(this.inputHandler);
          console.log('WalkthroughManager: InputHandler aggiunto.');

          // Aggiungi un listener più generico per qualsiasi evento di input
          this.inputHandler.addEventListener('inputsourcechange', (event) => {
              console.log('Input: Un input source (controller/mano) è cambiato o è stato rilevato!', event.detail);
          });
          this.inputHandler.addEventListener('inputsourceschange', (event) => { // Plurale, per quando cambiano più sorgenti
              console.log('Input: I input sources sono cambiati!', event.detail);
          });
          this.inputHandler.addEventListener('squeezestart', (event) => {
              console.log('Input: Evento squeezestart (grip) rilevato!', event.detail);
          });
          this.inputHandler.addEventListener('squeezeend', (event) => {
              console.log('Input: Evento squeezeend (grip) rilevato!', event.detail);
          });
          this.inputHandler.addEventListener('thumbstickmove', (event) => {
              // console.log('Input: Thumbstick mosso!', event.detail); // Commentato per non intasare la console
          });
          this.inputHandler.addEventListener('buttonpress', (event) => {
              console.log('Input: Pulsante controller premuto!', event.detail);
          });
          this.inputHandler.addEventListener('buttonrelease', (event) => {
              console.log('Input: Pulsante controller rilasciato!', event.detail);
          });


          this.inputHandler.addEventListener('selectstart', (event) => {
              console.log('Input: Evento selectstart rilevato!', event.detail);
              // Se il fade non è in corso, cambia lo splat
              if (this.fadeProgress === null) {
                  console.log('Input: Chiamata a cycleSplat() da selectstart.');
                  this.cycleSplat();
              } else {
                  console.log('Input: cycleSplat() bloccato, fade in corso.');
              }
          });

          this.inputHandler.addEventListener('selectend', (event) => {
              console.log('Input: Evento selectend rilevato!', event.detail);
          });
          // ******************************************************
          console.log('WalkthroughManager: Inizializzazione completata.');
        }

        /** Starts a crossfade to the next splat (wrapping around). */
        cycleSplat() {
          if (this.fadeProgress !== null) {
            console.log('cycleSplat(): Già in fase di transizione, ignoro la chiamata.');
            return;
          }
          this.nextIndex = (this.currentIndex + 1) % this.splatMeshes.length;
          console.log(`cycleSplat(): Transizione avviata da splat ${this.currentIndex} a ${this.nextIndex}.`);
          this.fadeProgress = 0;
        }

        onKeyDown(event) {
          console.log('Tastiera: Tasto premuto:', event.key.toLowerCase());
          const key = event.key.toLowerCase();
          if (key in this.keys) this.keys[key] = true;

          // Number key → jump to that splat (1-indexed).
          const idx = parseInt(key, 10) - 1;
          if (
            idx >= 0 &&
            idx < this.splatMeshes.length &&
            idx !== this.currentIndex &&
            this.fadeProgress === null
          ) {
            console.log(`Tastiera: Cambio splat a indice ${idx} tramite tasto numerico.`);
            this.nextIndex = idx;
            this.fadeProgress = 0;
          }
        }

        onKeyUp(event) {
          console.log('Tastiera: Tasto rilasciato:', event.key.toLowerCase());
          const key = event.key.toLowerCase();
          if (key in this.keys) this.keys[key] = false;
        }

        onXRSessionEnded() {
          super.onXRSessionEnded();
          this.baseReferenceSpace = null;
          this.locomotionOffset.set(0, 0, 0);
          console.log('XR Session: Sessione terminata.');
        }

        update() {
          super.update();
          const dt = xb.getDeltaTime();

          this.updateFade(dt);
          this.updateLocomotion();
        }

        /** Handles the fade-out → fade-in crossfade between splats. */
        updateFade(dt) {
          if (this.fadeProgress === null) return;

          this.fadeProgress += dt;
          const currentMesh = this.splatMeshes[this.currentIndex];

          if (this.fadeProgress < FADE_DURATION_S) {
            // Fading out the current splat.
            // console.log(`Fade: Fading out splat ${this.currentIndex}. Progress: ${this.fadeProgress / FADE_DURATION_S}`);
            currentMesh.opacity =
              1 - easeInOutSine(this.fadeProgress / FADE_DURATION_S);
          } else if (this.fadeProgress < 2 * FADE_DURATION_S) {
            // Swap on the first frame of the fade-in phase.
            if (currentMesh.parent) {
              xb.scene.remove(currentMesh);
              this.currentIndex = this.nextIndex;
              const nextMesh = this.splatMeshes[this.currentIndex];
              nextMesh.opacity = 0;
              xb.add(nextMesh);
              console.log(`Fade: Scambiato splat, ora mostro indice ${this.currentIndex}.`);
            }
            // Fading in the new splat.
            const inProgress =
              (this.fadeProgress - FADE_DURATION_S) / FADE_DURATION_S;
            // console.log(`Fade: Fading in splat ${this.currentIndex}. Progress: ${inProgress}`);
            this.splatMeshes[this.currentIndex].opacity =
              easeInOutSine(inProgress);
          } else {
            // Fade complete.
            this.splatMeshes[this.currentIndex].opacity = 1;
            this.fadeProgress = null;
            this.nextIndex = null;
            console.log(`Fade: Transizione completata per splat ${this.currentIndex}.`);
          }
        }

        /** WASD locomotion via XR reference space offset. */
        updateLocomotion() {
          const xr = xb.core.renderer?.xr;
          if (!xr?.isPresenting) return;

          const camera = xr.getCamera();
          if (!camera) return;

          camera.getWorldDirection(forward);
          forward.y = 0;
          forward.normalize();
          right.crossVectors(forward, THREE.Object3D.DEFAULT_UP).normalize();

          moveDirection.set(0, 0, 0);
          if (this.keys.w) moveDirection.add(forward);
          if (this.keys.s) moveDirection.sub(forward);
          if (this.keys.a) moveDirection.sub(right);
          if (this.keys.d) moveDirection.add(right);
          if (moveDirection.lengthSq() === 0) return;
          moveDirection.normalize();

          if (!this.baseReferenceSpace) {
            this.baseReferenceSpace = xr.getReferenceSpace();
          }

          this.locomotionOffset.addScaledVector(moveDirection, -MOVE_SPEED);
          const transform = new XRRigidTransform(this.locomotionOffset);
          xr.setReferenceSpace(
            this.baseReferenceSpace.getOffsetReferenceSpace(transform)
          );
        }
      }


async function withLegacyXrLayerFallback(fn) {
  if (typeof XRWebGLBinding === "undefined") {
console.log("  undefined...");    
    
    return await fn();
  }

  const proto = XRWebGLBinding.prototype;
  const descriptor = Object.getOwnPropertyDescriptor(
    proto,
    "createProjectionLayer"
  );

  try {
    if (descriptor) {
      // "Nasconde" la funzione che fa crashare l'emulatore
console.log("  nascondo...");    
      delete proto.createProjectionLayer;
    }
    return await fn();
  } finally {
    if (descriptor) {
      // La ripristina dopo l'avvio per non rompere altre cose
console.log("  ripristinare:");    
console.log("    descriptor = ", descriptor);    
console.log("  proto= ", proto);    
      
      console.log(' Object.defineProperty(temp2, "createProjectionLayer", temp1);');
//      Object.defineProperty(proto, "createProjectionLayer", descriptor);
    }
  }
}

      
      // Quando il contenuto della pagina è caricato, aggiungi il nostro script e inizializza XR Blocks.
document.addEventListener('DOMContentLoaded', async function () { // Aggiunto async qui
  const options = new xb.Options();
  options.reticles.enabled = false;
  options.hands.enabled = true;
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  options.simulator.scenePath = null;

  xb.add(new WalkthroughManager());

  // Invece di xb.init(options), usa questo:
  await withLegacyXrLayerFallback(async () => {
console.log("Vediamo se funziona....");    
    await xb.init(options);
console.log("Funzionato?");    
  });
});
    </script>
  </body>
</html>
